<section class="game">
  <h1 class="visually-hidden">Jouer contre le bot</h1>
  <div class="game__board">
    <div class="board-col">
      <app-capture-bar
        [label]="botName()"
        [pieces]="botCaptures()"
        [capturedColor]="playerPieceColor()"
        [advantage]="botAdvantage()"
      />
      <app-chessboard
      [fen]="fen()"
      [orientation]="playerColor()"
      [interactive]="isPlayerTurn()"
      [lockedForBot]="isThinking()"
      [lastMove]="lastMove()"
      [hintState]="hint()"
      [checkSquare]="checkSquare()"
      (move)="onMove($event)"
      />
      <app-capture-bar
        label="Toi"
        [pieces]="playerCaptures()"
        [capturedColor]="botPieceColor()"
        [advantage]="playerAdvantage()"
      />
    </div>
    <app-hint-overlay [hint]="hint()" (dismiss)="onDismissHint()" />
  </div>

  <aside class="game__side">
    <app-instructor-panel
      [difficulty]="difficulty()"
      [phase]="phase()"
      [coaching]="coaching()"
      [coachingLoading]="coachingLoading()"
      [gameResult]="gameResult()"
      [moves]="moveHistory()"
      [selectedBot]="bot()"
      [playerColor]="playerColor()"
      [lastGameId]="lastGameId()"
      (difficultyChange)="onDifficulty($event)"
      (botSelect)="onSelectBot($event)"
      (colorSelect)="onSelectColor($event)"
      (undo)="onUndo()"
      (hint)="onHint()"
      (newGame)="onNewGame()"
    />
  </aside>
</section>
