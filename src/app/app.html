<header class="app-header">
  <a class="brand" routerLink="/">
    <span class="brand__mark" aria-hidden="true">♞</span>
    <span class="brand__name">{{ title }}</span>
  </a>

  <nav class="app-nav" aria-label="Navigation principale">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Entraînement
    </a>
    <a routerLink="/instructor" routerLinkActive="active">Jouer contre le bot</a>
    <a routerLink="/review" routerLinkActive="active">Analyse</a>
    <a routerLink="/stats" routerLinkActive="active">Progression</a>

    <button
      type="button"
      class="sound-toggle"
      (click)="toggleSound()"
      [attr.aria-pressed]="muted()"
      [attr.aria-label]="muted() ? 'Activer le son' : 'Couper le son'"
      [title]="muted() ? 'Activer le son' : 'Couper le son'"
    >
      {{ muted() ? '🔇' : '🔊' }}
    </button>
  </nav>
</header>

<main class="app-main">
  <router-outlet />
</main>
